networks:
  exit1:
    ipam:
      config:
        - subnet: 172.100.0.0/24
  exit2:
    ipam:
      config:
        - subnet: 172.101.0.0/24

services:
  awg-easy:
    image: ghcr.io/w0rng/amnezia-wg-easy
    container_name: awg-easy
    restart: unless-stopped
    init: true
    entrypoint: ["sh", "/routing-init.sh"]
    command: ["/usr/bin/dumb-init", "node", "server.js"]
    environment:
      - LANG=${LANG:-en}
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${AWG_PASSWORD_HASH}
      - PORT=51821
      - WG_DEFAULT_DNS=${AWG_DEFAULT_DNS:-1.1.1.1}
      - WG_PORT=${AWG_PORT:-51820}
      - WG_DEFAULT_ADDRESS=${AWG_DEFAULT_ADDRESS:-10.0.0.x}
      - WG_ALLOWED_IPS=${AWG_ALLOWED_IPS:-0.0.0.0/0, ::/0}
      - WG_PERSISTENT_KEEPALIVE=${AWG_PERSISTENT_KEEPALIVE:-25}
      - EXIT_ROUTES=${EXIT_ROUTES:-}
    volumes:
      - ./data/awg:/etc/wireguard
      - ./wg-easy/routing-init.sh:/routing-init.sh:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${AWG_PORT:-51820}:${AWG_PORT:-51820}/udp"
      # Bind admin panel to localhost only — access via SSH tunnel
      - "127.0.0.1:51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      - exit1
      - exit2

  host-routing:
    build: ./host-routing
    container_name: host-routing
    network_mode: host
    restart: unless-stopped
    depends_on:
      awg-easy:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    environment:
      - EXIT_ROUTES=${EXIT_ROUTES:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./host-routing/manage.sh:/app/manage.sh:ro
      - ./host-routing/daemon.sh:/app/daemon.sh:ro
    entrypoint: ["sh", "/app/daemon.sh"]

  # Drops nDPI-classified traffic (default: BitTorrent) on the host's
  # DOCKER-USER chain. Bundles libxt_ndpi.so; needs the xt_ndpi kernel module
  # on the host (xt-ndpi-dkms). Build the .debs first: ./setup-host/ndpi-setup.sh build
  xt-ndpi-rules:
    build:
      context: .
      dockerfile: xt-ndpi-rules/Dockerfile
    container_name: xt-ndpi-rules
    # host netns so its iptables writes into the host's tables (where dockerd
    # creates DOCKER-USER); NET_ADMIN to edit them, SYS_MODULE to load xt_ndpi.
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - NDPI_CHAIN=${NDPI_CHAIN:-DOCKER-USER}
      - NDPI_DROP=${NDPI_DROP:-bittorrent}
      # Enforce ONLY on the VPN exit subnets (the source on DOCKER-USER after
      # the container's MASQUERADE), so it never touches non-VPN traffic. Each
      # entry is one exit — drop an entry to leave that exit unblocked, or set
      # NDPI_SOURCE= (explicitly empty) to enforce on ALL forwarded traffic.
      # ('-' not ':-' so an empty value means unscoped, unset means the default)
      #   exit1 = 172.100.0.0/24    exit2 = 172.101.0.0/24
      - NDPI_SOURCE=${NDPI_SOURCE-172.100.0.0/24,172.101.0.0/24}
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./xt-ndpi-rules/manage.sh:/app/manage.sh:ro
      - ./xt-ndpi-rules/daemon.sh:/app/daemon.sh:ro

  # Throwaway probe used by ./xt-ndpi-rules/verify.sh. Lives on the real exit1
  # network, so traffic it sends out is forwarded through DOCKER-USER sourced
  # from the exit1 subnet — exactly like a VPN client. Profiled, so a normal
  # `docker compose up` never starts it; verify drives it with
  # `docker compose run`.
  ndpi-probe-exit1:
    profiles: ["verify"]
    image: python:3-slim
    networks:
      - exit1
    entrypoint: ["python3", "-c"]

  ndpi-probe-exit2:
    profiles: ["verify"]
    image: python:3-slim
    networks:
      - exit2
    entrypoint: ["python3", "-c"]

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    restart: unless-stopped
    entrypoint: ["sh", "/routing-init.sh"]
    command: ["/usr/bin/dumb-init", "node", "server/index.mjs"]
    environment:
      - INSECURE=true
      - EXIT_ROUTES=${EXIT_ROUTES:-}
    volumes:
      - ./data/wg:/etc/wireguard
      - /lib/modules:/lib/modules:ro
      - ./wg-easy/routing-init.sh:/routing-init.sh:ro
    ports:
      - "${WG_PORT:-51830}:${WG_PORT:-51830}/udp"
      # Bind admin panel to localhost only — access via SSH tunnel
      - "127.0.0.1:51831:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    networks:
      - exit1
      - exit2